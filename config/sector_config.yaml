# GoAP Sector Configuration
# Pain signal keywords and scoring weights for each target sector
# Expanded to cover EU-wide distressed companies (Germany, Austria, France, Netherlands, Sweden, Italy)

# Target countries for news scanning
target_countries:
  - "Germany"
  - "Austria"
  - "France"
  - "Netherlands"
  - "Sweden"
  - "Italy"
  - "Belgium"
  - "Finland"
  - "Czech Republic"
  - "Spain"

sectors:
  automotive_components:
    display_name: "Automotive Components"
    keywords:
      - "automotive supplier"
      - "Zulieferer"
      - "auto parts"
      - "Tier 1 supplier"
      - "Tier 2 supplier"
      - "powertrain"
      - "drivetrain"
      - "braking systems"
      - "chassis"
      - "fournisseur automobile"
      - "leverancier automotive"
    pain_keywords:
      - "restructuring"
      - "Restrukturierung"
      - "plant closure"
      - "Werksschließung"
      - "job cuts"
      - "Stellenabbau"
      - "insolvency"
      - "Insolvenz"
      - "Kurzarbeit"
      - "cost cutting"
      - "profit warning"
      - "Gewinnwarnung"
      - "headcount reduction"
      - "site consolidation"
      - "capacity reduction"
      - "production shift"
      - "restructuration"
      - "fermeture usine"
      - "licenciement"
    expansion_keywords:
      - "overseas expansion"
      - "international growth"
      - "best-cost country"
      - "nearshoring"
      - "offshoring"
      - "new plant"
      - "greenfield"
      - "joint venture"
      - "production relocation"

  ev_components:
